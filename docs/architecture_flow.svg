<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura e fluxo da POC Finance AI</title>
  <desc id="desc">Diagrama com Google Chat, Cloud Run Chat Adapter, ADK Agent, Vertex AI, BigQuery, Chart Tool e Cloud Storage.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .title { font: 700 38px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 20px Arial, sans-serif; fill: #526071; }
      .section-title { font: 700 16px Arial, sans-serif; letter-spacing: .08em; fill: #607086; }
      .box { fill: #ffffff; stroke: #d8e0eb; stroke-width: 2; rx: 18; }
      .box-main { fill: #eef7ff; stroke: #7bb8f2; stroke-width: 2; rx: 18; }
      .box-sec { fill: #f2fff7; stroke: #72c596; stroke-width: 2; rx: 18; }
      .box-warn { fill: #fff6e8; stroke: #f2b455; stroke-width: 2; rx: 18; }
      .box-log { fill: #f5f2ff; stroke: #a995e8; stroke-width: 2; rx: 18; }
      .label { font: 700 22px Arial, sans-serif; fill: #172033; }
      .small { font: 400 15px Arial, sans-serif; fill: #526071; }
      .tiny { font: 400 13px Arial, sans-serif; fill: #64748b; }
      .step { fill: #0b72d9; }
      .step-text { font: 700 14px Arial, sans-serif; fill: #ffffff; }
      .arrow { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #64748b; stroke-width: 3; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow-soft); }
      .lane { fill: #ffffff; stroke: #e5ebf3; stroke-width: 1.5; rx: 24; }
      .chip { fill: #eaf2ff; stroke: #bed7ff; stroke-width: 1; rx: 12; }
      .chip-text { font: 700 13px Arial, sans-serif; fill: #2458a6; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="70" y="78">Finance AI POC - Arquitetura e Fluxo</text>
  <text class="subtitle" x="70" y="112">Google Chat + Cloud Run Adapter + ADK Agent + Vertex AI + BigQuery + BI Agent com graficos</text>

  <rect class="chip" x="1190" y="58" width="300" height="38"/>
  <text class="chip-text" x="1212" y="82">Status: Chat + BI Agent validados</text>

  <rect class="lane" x="60" y="160" width="1480" height="410" filter="url(#shadow)"/>
  <text class="section-title" x="90" y="198">FLUXO PRINCIPAL DA CONVERSA</text>

  <g transform="translate(95 245)">
    <rect class="box" width="190" height="120"/>
    <circle class="step" cx="26" cy="28" r="18"/>
    <text class="step-text" x="21" y="33">1</text>
    <text class="label" x="28" y="65">Usuario</text>
    <text class="small" x="28" y="92">Area de negocio</text>
  </g>

  <g transform="translate(340 245)">
    <rect class="box-main" width="210" height="120"/>
    <circle class="step" cx="26" cy="28" r="18"/>
    <text class="step-text" x="21" y="33">2</text>
    <text class="label" x="28" y="62">Google Chat</text>
    <text class="small" x="28" y="90">Finance AI POC</text>
  </g>

  <g transform="translate(610 245)">
    <rect class="box-main" width="220" height="120"/>
    <circle class="step" cx="26" cy="28" r="18"/>
    <text class="step-text" x="21" y="33">3</text>
    <text class="label" x="28" y="62">Cloud Run</text>
    <text class="small" x="28" y="90">Chat Adapter HTTP</text>
  </g>

  <g transform="translate(895 245)">
    <rect class="box-sec" width="210" height="120"/>
    <circle class="step" cx="26" cy="28" r="18"/>
    <text class="step-text" x="21" y="33">4</text>
    <text class="label" x="28" y="62">ADK Agent</text>
    <text class="small" x="28" y="90">Agente financeiro</text>
  </g>

  <g transform="translate(1165 245)">
    <rect class="box-sec" width="230" height="120"/>
    <circle class="step" cx="26" cy="28" r="18"/>
    <text class="step-text" x="21" y="33">5</text>
    <text class="label" x="28" y="62">Vertex AI</text>
    <text class="small" x="28" y="90">Gemini via GCP</text>
  </g>

  <path class="arrow" d="M 285 305 L 335 305"/>
  <text class="tiny" x="292" y="292">pergunta</text>
  <path class="arrow" d="M 550 305 L 605 305"/>
  <text class="tiny" x="558" y="292">evento HTTP</text>
  <path class="arrow" d="M 830 305 L 890 305"/>
  <text class="tiny" x="835" y="292">texto + usuario</text>
  <path class="arrow" d="M 1105 305 L 1160 305"/>
  <text class="tiny" x="1110" y="292">raciocinio</text>

  <g transform="translate(610 410)">
    <rect class="box-sec" width="310" height="120"/>
    <circle class="step" cx="26" cy="28" r="18"/>
    <text class="step-text" x="21" y="33">6</text>
    <text class="label" x="28" y="62">SQL Validator</text>
    <text class="small" x="28" y="90">Allowlist + dry run + limite</text>
  </g>

  <g transform="translate(1010 410)">
    <rect class="box-sec" width="300" height="120"/>
    <circle class="step" cx="26" cy="28" r="18"/>
    <text class="step-text" x="21" y="33">7</text>
    <text class="label" x="28" y="62">BigQuery</text>
    <text class="small" x="28" y="90">Views financeiras da POC</text>
  </g>

  <path class="arrow" d="M 1000 365 C 940 390, 900 420, 860 445"/>
  <text class="tiny" x="910" y="405">SQL proposto</text>
  <path class="arrow" d="M 920 470 L 1005 470"/>
  <text class="tiny" x="932" y="456">SELECT validado</text>
  <path class="arrow" d="M 1010 502 L 925 502"/>
  <text class="tiny" x="930" y="526">resultado</text>

  <path class="arrow" d="M 610 500 C 510 540, 390 535, 345 365"/>
  <text class="tiny" x="390" y="542">resposta JSON { text }</text>
  <path class="arrow" d="M 340 335 L 290 335"/>
  <text class="tiny" x="295" y="358">resposta final</text>

  <rect class="lane" x="60" y="615" width="1480" height="205" filter="url(#shadow)"/>
  <text class="section-title" x="90" y="653">CONTROLES, MEMORIA, GRAFICOS E STATUS ATUAL</text>

  <g transform="translate(95 685)">
    <rect class="box-log" width="300" height="92"/>
    <text class="label" x="28" y="40">Cloud Logging</text>
    <text class="small" x="28" y="68">erros, chamadas e diagnostico</text>
  </g>

  <g transform="translate(455 685)">
    <rect class="box" width="300" height="92"/>
    <text class="label" x="28" y="40">Sessao ADK</text>
    <text class="small" x="28" y="68">memoria em processo na POC</text>
  </g>

  <g transform="translate(815 685)">
    <rect class="box-sec" width="320" height="92"/>
    <text class="label" x="28" y="40">Chart Tool</text>
    <text class="small" x="28" y="68">PNG, legendas e series</text>
  </g>

  <g transform="translate(1195 685)">
    <rect class="box" width="300" height="92"/>
    <text class="label" x="28" y="40">Cloud Storage</text>
    <text class="small" x="28" y="68">links dos graficos PNG</text>
  </g>

  <path class="arrow-soft" d="M 720 410 C 620 620, 340 620, 245 685"/>
  <path class="arrow-soft" d="M 1045 530 C 1030 615, 980 642, 955 685"/>
  <path class="arrow-soft" d="M 1130 530 C 1200 620, 1290 642, 1345 685"/>

  <text class="tiny" x="70" y="865">Checkpoint: Google Chat, multiplas perguntas, datas relativas e graficos PNG no Cloud Storage validados. Proxima fase: auditoria, IAM dedicado e seguranca.</text>
</svg>
